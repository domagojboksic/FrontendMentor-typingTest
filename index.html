<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Typing Speed Test</title>

  <link rel="stylesheet" href="styles/main.css">
</head>
<body>

  <header class="header">
    <div class="logo">
      <picture>
        <source media="(min-width:48rem)" srcset="assets/images/logo-large.svg">
        <img src="./assets/images/logo-small.svg" alt="logo icon">
      </picture>
    </div>

    <div class="best-score">
      <img src="assets/images/icon-personal-best.svg" alt="trophy icon for best score">
      <p class="mobile-only">Best:</p>
      <p class="desktop-only">Personal best:</p>
      <p class="current-high-score"></p>
    </div>
  </header>

  <nav class="navbar">
    <div class="stats">
      <div id="wpm" class="stat-container">
        <p>WPM:</p>
        <p class="current-wpm current">0</p>
      </div>
      <div id="accuracy" class="stat-container">
        <p>Accuracy:</p>
        <p class="current-accuracy current">100%</p>
      </div>
      <div id="time" class="stat-container">
        <p>Time:</p>
        <p class="current-time current">0:60</p>
      </div>
    </div>

    <div class="difficulty-mode">
      <div id="difficulty">
        <p class="desktop-only">Difficulty:</p>
        <div class="actions desktop-only">
          <button class="btn easy">Easy</button>
          <button class="btn medium">Medium</button>
          <button class="btn hard">Hard</button>
        </div>

        <select class="options mobile-only">
          <option value="easy">Easy</option>
          <option value="medium">Medium</option>
          <option value="hard">Hard</option>
        </select>
      </div>

      <div id="mode">
        <p class="desktop-only">Mode:</p>
        <div class="actions desktop-only">
          <button class="btn timed">Timed(60s)</button>
          <button class="btn passage">Passage</button>
        </div>

        <select class="options mobile-only">
          <option value="timed">Timed(60s)</option>
          <option value="passage">Passage</option>
        </select>
      </div>
    </div>
  </nav>

  <main class="main">

  </main>

</body>
</html>
